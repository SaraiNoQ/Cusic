openapi: 3.1.0
info:
  title: Music AI App API
  version: 0.1.0
  description: Static OpenAPI draft aligned with docs/specs/api-design.md
servers:
  - url: /api/v1
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiSuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
        meta:
          type: object
          additionalProperties: true
    ApiErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
        meta:
          type: object
          additionalProperties: true
    PaginationMeta:
      type: object
      required: [page, pageSize, total, hasMore]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean
    ContentItemDto:
      type: object
      required: [id, type, title, artists]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [track, podcast, radio, album]
        title:
          type: string
        artists:
          type: array
          items:
            type: string
        album:
          type: string
          nullable: true
        durationMs:
          type: integer
          nullable: true
        language:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
        audioUrl:
          type: string
          nullable: true
        playable:
          type: boolean
    PlayerQueueStateDto:
      type: object
      required: [queueId, count, items, activeIndex, currentTrack, positionMs]
      properties:
        queueId:
          type: string
        mode:
          type: string
          enum: [replace, append]
        count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ContentItemDto'
        activeIndex:
          type: integer
        currentTrack:
          anyOf:
            - $ref: '#/components/schemas/ContentItemDto'
            - type: 'null'
        positionMs:
          type: integer
    PlaylistSummaryDto:
      type: object
      required: [id, title, description, playlistType, itemCount]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        playlistType:
          type: string
          enum: [user_created, ai_generated, daily, imported]
        itemCount:
          type: integer
    PlaylistItemDto:
      type: object
      required: [position, content]
      properties:
        position:
          type: integer
        content:
          $ref: '#/components/schemas/ContentItemDto'
    PlaylistDetailDto:
      allOf:
        - $ref: '#/components/schemas/PlaylistSummaryDto'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/PlaylistItemDto'
    TasteProfileDto:
      type: object
      required: [summary, explorationLevel, tags]
      properties:
        summary:
          type: string
        explorationLevel:
          type: string
        tags:
          type: array
          items:
            type: object
            required: [type, value, weight, isNegative]
            properties:
              type:
                type: string
              value:
                type: string
              weight:
                type: number
              isNegative:
                type: boolean
    RecommendationCardDto:
      type: object
      required: [contentId, title, reason, content]
      properties:
        contentId:
          type: string
        title:
          type: string
        reason:
          type: string
        content:
          $ref: '#/components/schemas/ContentItemDto'
    UpdateTasteTagsDto:
      type: object
      required: [updates]
      properties:
        updates:
          type: array
          items:
            type: object
            required: [type, value, action]
            properties:
              type:
                type: string
              value:
                type: string
              action:
                type: string
                enum: [increase, decrease, remove]
    TasteProfileUpdateResponseDto:
      type: object
      required: [updated, profile]
      properties:
        updated:
          type: integer
        profile:
          $ref: '#/components/schemas/TasteProfileDto'
    NowRecommendationDto:
      type: object
      required: [recommendationId, explanation, items]
      properties:
        recommendationId:
          type: string
        explanation:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationCardDto'
    DailyPlaylistDto:
      type: object
      required:
        [
          playlistId,
          title,
          description,
          itemCount,
          recommendationResultId,
          items,
        ]
      properties:
        playlistId:
          type: string
        title:
          type: string
        description:
          type: string
        itemCount:
          type: integer
        recommendationResultId:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ContentItemDto'
    RecommendationFeedbackDto:
      type: object
      required: [targetType, targetId, feedbackType]
      properties:
        targetType:
          type: string
        targetId:
          type: string
        feedbackType:
          type: string
          enum: [like, dislike, more_like_this, less_like_this]
        recommendationResultId:
          type: string
          nullable: true
        reasonText:
          type: string
          nullable: true
    RecommendationFeedbackResponseDto:
      type: object
      required: [feedbackId, recorded]
      properties:
        feedbackId:
          type: string
        recorded:
          type: boolean
    ChatTurnRequestDto:
      type: object
      required: [message, responseMode]
      properties:
        sessionId:
          type: string
        message:
          type: string
        responseMode:
          type: string
          enum: [sync, stream]
        surfaceContext:
          type: object
          properties:
            currentTrackId:
              type: string
              nullable: true
            queueContentIds:
              type: array
              items:
                type: string
    AiDjActionDto:
      oneOf:
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [queue_replace]
            payload:
              type: object
              required: [contentIds]
              properties:
                contentIds:
                  type: array
                  items:
                    type: string
        - type: object
          required: [type, payload]
          properties:
            type:
              type: string
              enum: [queue_append]
            payload:
              type: object
              required: [contentIds]
              properties:
                contentIds:
                  type: array
                  items:
                    type: string
    ChatTurnResponseDto:
      type: object
      required: [sessionId, messageId, intent, replyText, actions]
      properties:
        sessionId:
          type: string
        messageId:
          type: string
        intent:
          type: string
          enum:
            [
              queue_replace,
              queue_append,
              recommend_explain,
              theme_playlist_preview,
            ]
        replyText:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/AiDjActionDto'
    SaveAiPlaylistRequestDto:
      type: object
      required: [sessionId, messageId]
      properties:
        sessionId:
          type: string
        messageId:
          type: string
        title:
          type: string
    SaveAiPlaylistResponseDto:
      type: object
      required: [created, playlist]
      properties:
        created:
          type: boolean
        playlist:
          anyOf:
            - $ref: '#/components/schemas/PlaylistSummaryDto'
            - type: 'null'
    CreateImportJobRequestDto:
      type: object
      required: [providerName, importType, payload]
      properties:
        providerName:
          type: string
        importType:
          type: string
          enum: [playlist, history]
        payload:
          type: object
          additionalProperties: true
    ImportJobDto:
      type: object
      required:
        [
          jobId,
          status,
          providerName,
          jobType,
          payload,
          resultSummary,
          errorText,
          createdAt,
          updatedAt,
          startedAt,
          finishedAt,
        ]
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
        providerName:
          type: string
        jobType:
          type: string
          enum: [playlist_import, history_import]
        payload:
          type: object
          additionalProperties: true
        resultSummary:
          anyOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        errorText:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
    AiDjStreamChunkEventDto:
      type: object
      required: [event, sessionId, messageId, delta]
      properties:
        event:
          type: string
          enum: [chunk]
        sessionId:
          type: string
        messageId:
          type: string
        delta:
          type: string
    AiDjStreamActionsEventDto:
      type: object
      required: [event, sessionId, messageId, actions]
      properties:
        event:
          type: string
          enum: [actions]
        sessionId:
          type: string
        messageId:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/AiDjActionDto'
    AiDjStreamDoneEventDto:
      type: object
      required: [event, sessionId, messageId, replyText, actions]
      properties:
        event:
          type: string
          enum: [done]
        sessionId:
          type: string
        messageId:
          type: string
        replyText:
          type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/AiDjActionDto'
    ChatSessionMessageDto:
      type: object
      required: [id, role, messageType, text, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [assistant, user]
        messageType:
          type: string
          enum: [text, action]
        text:
          type: string
        intent:
          type: string
          nullable: true
          enum:
            [
              queue_replace,
              queue_append,
              recommend_explain,
              theme_playlist_preview,
            ]
        actions:
          type: array
          items:
            $ref: '#/components/schemas/AiDjActionDto'
        createdAt:
          type: string
          format: date-time
paths:
  /system/health:
    get:
      summary: API health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEnvelope'
  /auth/email/request-code:
    post:
      summary: Request SMTP email verification code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Code requested. The clear text code is never returned.
        '503':
          description: SMTP or JWT configuration is missing
  /auth/login:
    post:
      summary: Login with email code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Login success
        '400':
          description: Verification code is invalid or expired
  /auth/refresh:
    post:
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed and refresh token rotated
        '401':
          description: Refresh token is invalid or revoked
  /auth/logout:
    post:
      summary: Logout current session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Session revoked
  /auth/me:
    get:
      summary: Get current user
      responses:
        '200':
          description: Current user
        '401':
          description: Access token is invalid or expired
  /search:
    get:
      summary: Search the persisted content catalog
      description: Searches Prisma-backed content_items after syncing the demo catalog into content_provider_mappings.
      security: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum: [track, podcast, radio, album]
        - in: query
          name: language
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: pageSize
          schema:
            type: integer
      responses:
        '200':
          description: Search results from content_items
  /content/{id}:
    get:
      summary: Get content detail
      description: Reads content detail from the persisted content catalog.
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Content item
  /content/{id}/related:
    get:
      summary: Get related content
      description: Returns same-type related items from the persisted catalog.
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Related items
  /player/queue:
    get:
      summary: Get current player queue
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: Current queue state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlayerQueueStateDto'
    post:
      summary: Replace or append player queue
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode, items]
              properties:
                mode:
                  type: string
                  enum: [replace, append]
                items:
                  type: array
                  items:
                    type: object
                    required: [contentId]
                    properties:
                      contentId:
                        type: string
                activeIndex:
                  type: integer
                currentContentId:
                  type: string
                  nullable: true
                positionMs:
                  type: integer
      responses:
        '200':
          description: Queue updated
  /player/events:
    post:
      summary: Ingest playback events
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: Event recorded
  /library/playlists:
    get:
      summary: List playlists
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: Playlist list
    post:
      summary: Create playlist
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: Playlist created
  /library/playlists/{id}:
    get:
      summary: Get playlist detail
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playlist detail or null when missing
    patch:
      summary: Update playlist metadata
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playlist updated
    delete:
      summary: Delete playlist
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playlist deleted
  /library/playlists/{id}/items:
    post:
      summary: Add playlist items
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Items added, with addedCount and skippedCount
  /library/playlists/{id}/items/{contentId}:
    delete:
      summary: Remove playlist item
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: contentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playlist item removed
  /library/favorites:
    get:
      summary: List favorites
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: Favorite list
    post:
      summary: Create favorite
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: Favorite created
  /library/favorites/{contentId}:
    delete:
      summary: Remove favorite
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: path
          name: contentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Favorite removed
  /profile/taste-report:
    get:
      summary: Get taste profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Taste profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasteProfileDto'
  /profile/tags:
    patch:
      summary: Update profile tags
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTasteTagsDto'
      responses:
        '200':
          description: Tags updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasteProfileUpdateResponseDto'
  /recommend/now:
    get:
      summary: Get contextual recommendations
      parameters:
        - in: header
          name: X-Cusic-Timezone
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Recommendation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NowRecommendationDto'
  /playlist/daily:
    get:
      summary: Get daily playlist
      parameters:
        - in: header
          name: X-Cusic-Timezone
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Daily playlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyPlaylistDto'
  /feedback:
    post:
      summary: Submit feedback
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationFeedbackDto'
      responses:
        '200':
          description: Feedback recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationFeedbackResponseDto'
  /dj/chat:
    post:
      summary: Submit a DJ chat turn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatTurnRequestDto'
      responses:
        '200':
          description: Chat turn response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatTurnResponseDto'
  /dj/sessions/{sessionId}/messages:
    get:
      summary: Get AI DJ session messages
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSessionMessageDto'
  /dj/playlists:
    post:
      summary: Save an AI DJ theme preview as a playlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAiPlaylistRequestDto'
      responses:
        '200':
          description: AI playlist saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveAiPlaylistResponseDto'
  /dj/chat/stream:
    get:
      summary: Stream DJ response over SSE
      parameters:
        - in: query
          name: sessionId
          required: true
          schema:
            type: string
        - in: query
          name: messageId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: text/event-stream response
  /dj/voice/asr:
    post:
      summary: Speech to text
      responses:
        '200':
          description: ASR result
  /dj/voice/tts:
    post:
      summary: Text to speech
      responses:
        '200':
          description: TTS result
  /imports/playlists:
    post:
      summary: Create import job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportJobRequestDto'
      responses:
        '200':
          description: Import accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobDto'
  /imports/{jobId}:
    get:
      summary: Get import job status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Import status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobDto'
