services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: music-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: music_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: music-ai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: 'music-ai-api:${IMAGE_TAG:-latest}'
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: music-ai-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: 'music-ai-web:${IMAGE_TAG:-latest}'
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        API_INTERNAL_URL: http://api:3001
    container_name: music-ai-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - 'api:host-gateway'

  worker:
    image: 'music-ai-worker:${IMAGE_TAG:-latest}'
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: music-ai-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
